name: Release Please

on:
  push:
    branches: [main]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release-type: simple

      # Force-move the `stable` tag to the latest release commit
      - uses: actions/checkout@v7
        if: ${{ steps.release.outputs.release_created }}

      - name: Move stable tag
        if: ${{ steps.release.outputs.release_created }}
        run: |
          git tag -f stable
          git push origin stable --force
