name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Check formatting (stylua)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          version: latest
          args: --check lua/ plugin/

      - name: Lint (selene)
        uses: AlejandroSuero/selene-linter-action@v1.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          args: --display-style=quiet lua/ plugin/

  test:
    name: Test (Neovim ${{ matrix.neovim_version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        neovim_version: [stable, nightly]
    steps:
      - uses: actions/checkout@v7

      - name: Install Neovim ${{ matrix.neovim_version }}
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: ${{ matrix.neovim_version }}

      - name: Run tests
        run: |
          nvim --headless --noplugin -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/spec/ {sequential = true}"

  coverage:
    name: Coverage (core/ — 100%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Neovim stable
        uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable

      - name: Install lua5.1 and luacov
        run: |
          sudo apt-get install -y lua5.1 luarocks
          luarocks --lua-version=5.1 install --local luacov

      - name: Run tests with coverage
        run: |
          COVERAGE=1 nvim --headless --noplugin -u tests/minimal_init.lua \
            -c "PlenaryBustedDirectory tests/spec/ {sequential = true}"
          LUA_PATH="$HOME/.luarocks/share/lua/5.1/?.lua;$HOME/.luarocks/share/lua/5.1/?/init.lua;;" \
            lua5.1 -e "require('luacov.reporter').report()"

      - name: Debug stats file
        if: always()
        run: |
          echo "=== luacov.stats.out ==="
          wc -l luacov.stats.out 2>/dev/null || echo "(stats file not found)"
          head -20 luacov.stats.out 2>/dev/null || echo "(empty)"

      - name: Print coverage report
        if: always()
        run: cat luacov.report.out 2>/dev/null || echo "(no report generated)"

      - name: Enforce 100% coverage on core/ modules
        run: |
          python3 - << 'EOF'
          import re, sys

          try:
              with open('luacov.report.out') as f:
                  content = f.read()
          except FileNotFoundError:
              print('ERROR: luacov.report.out not found — was coverage collected?')
              sys.exit(1)

          failed = False
          checked = []
          for line in content.splitlines():
              m = re.search(r'(tobira/core/\w+\.lua)\s+(\d+)\s+(\d+)\s+([\d.]+)%', line)
              if m:
                  path = m.group(1)
                  missed = int(m.group(3))
                  pct = float(m.group(4))
                  checked.append(path)
                  mark = 'OK  ' if pct >= 100.0 else 'FAIL'
                  print(f'[{mark}] {path}: {pct:.2f}% ({missed} line(s) missed)')
                  if pct < 100.0:
                      failed = True

          if not checked:
              print('ERROR: No tobira/core/ entries found — check .luacov include patterns')
              sys.exit(1)

          if failed:
              print('\nCoverage gate FAILED. Add tests for the missed lines above.')
              sys.exit(1)
          else:
              print(f'\nAll {len(checked)} core module(s): 100% ✓')
          EOF
