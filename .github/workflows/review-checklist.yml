name: Review checklist

on:
  pull_request_target:
    types: [opened]

jobs:
  checklist:
    name: Post checklist for first-time contributors
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Check if first-time contributor
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              per_page: 100,
            });
            const prior = prs.filter(
              pr => pr.user.login === context.payload.pull_request.user.login
                && pr.number !== context.payload.pull_request.number
            );
            core.setOutput('is_first_time', prior.length === 0 ? 'true' : 'false');

      - name: Post checklist comment
        if: steps.check.outputs.is_first_time == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: `Thanks for your first contribution! 🎉\n\nPlease make sure your PR satisfies the following:\n\n- [ ] PR title follows [Conventional Commits](https://www.conventionalcommits.org/) (e.g. \`feat: add x pattern\`, \`fix: ...\`)\n- [ ] Code is formatted with \`stylua\`\n- [ ] \`selene\` reports no errors\n- [ ] Tested on Neovim stable\n\nSee [CONTRIBUTING.md](../blob/main/CONTRIBUTING.md) for details.`
            });
