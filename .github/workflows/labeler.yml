name: Labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  size:
    name: PR size label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_label: size/xs
          xs_max_size: 10
          s_label: size/s
          s_max_size: 50
          m_label: size/m
          m_max_size: 150
          l_label: size/l
          l_max_size: 500
          xl_label: size/xl
          fail_if_xl: false
