name: Bug report
description: Report a bug in tobira.nvim
title: ""
labels:
  - bug
body:
  - type: textarea
    id: background
    attributes:
      label: Description
      description: What is happening?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call setup()
        2. Press f in normal mode
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      placeholder: |
        - Neovim: 0.10.x
        - OS: macOS 15.x
        - Installed via: lazy.nvim
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues / PRs
    validations:
      required: false
