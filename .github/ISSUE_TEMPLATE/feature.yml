name: Feature request
description: Propose a new feature, pattern, or improvement
title: ""
labels:
  - feature
body:
  - type: textarea
    id: background
    attributes:
      label: Background
      description: Why is this change needed?
    validations:
      required: true
  - type: textarea
    id: todo
    attributes:
      label: What to do
      description: Describe the implementation in bullet points
    validations:
      required: true
  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: |
        What does "done" look like? (bullet points)
        If you add the `claude-ready` label to trigger the issue-to-PR workflow,
        Claude will use these criteria to determine when the implementation is complete.
      placeholder: |
        - The specified key sequence triggers a suggestion after 1.5s
        - :TobiraStats reflects the new usage count
        - Existing tests pass
    validations:
      required: true
  - type: textarea
    id: technical-notes
    attributes:
      label: Technical notes (optional)
      description: |
        Files to change, existing patterns to reference, constraints, etc.
        The more specific hints you provide, the more accurate the issue-to-PR output will be.
      placeholder: |
        - Target file: lua/tobira/core/logger.lua → handle_key()
        - Reference: existing f_repeat pattern
        - Also needs an entry in graph.lua suggestions table
    validations:
      required: false
  - type: textarea
    id: related
    attributes:
      label: Related issues / PRs
    validations:
      required: false
