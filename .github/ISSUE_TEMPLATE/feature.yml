name: Feature request
description: Propose a new feature, pattern, or improvement
title: ""
labels:
  - feature
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Before requesting
      options:
        - label: I have searched existing issues and discussions
          required: true

  - type: dropdown
    id: significance
    attributes:
      label: Significance
      options:
        - Nice to have
        - Strongly desired
        - Cannot use this plugin without it
    validations:
      required: true

  - type: textarea
    id: background
    attributes:
      label: Background
      description: Why is this change needed? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: todo
    attributes:
      label: What to do
      description: Describe the implementation in bullet points
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance criteria
      description: What does "done" look like?
      placeholder: |
        - The specified key sequence triggers a suggestion after 1.5s
        - :TobiraStats reflects the new usage count
        - Existing tests pass
    validations:
      required: true

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical notes (optional)
      description: Files to change, patterns to reference, constraints
      placeholder: |
        - Target: lua/tobira/core/logger.lua → handle_key()
        - Reference: existing f_repeat pattern
        - Also needs an entry in graph.lua suggestions table
    validations:
      required: false

  - type: textarea
    id: related
    attributes:
      label: Related issues / PRs
    validations:
      required: false
